name: CI/CD - Order Service

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'order-service/**'
      - '.github/workflows/order-service.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'order-service/**'
      - '.github/workflows/order-service.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: 'order-service/pom.xml'

    - name: Build and Test with Maven
      working-directory: ./order-service
      run: |
        chmod +x mvnw || true
        ./mvnw clean package -DskipTests=false

    - name: Downcase repository owner
      id: downcase
      run: |
        echo "owner_lc=${OWNER,,}" >> ${GITHUB_OUTPUT}
      env:
        OWNER: "${{ github.repository_owner }}"

    - name: Set up Docker Buildx
      uses: actions/docker-setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./order-service
        file: ./order-service/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ steps.downcase.outputs.owner_lc }}/order-service:latest
          ghcr.io/${{ steps.downcase.outputs.owner_lc }}/order-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
